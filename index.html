<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Football Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="phone-screen">

    <!-- Status Bar -->
    <div class="status-bar">
      <span class="status-time" id="clock">09:41</span>
      <div class="status-icons">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 00-6 0zm-4-4l2 2a7.074 7.074 0 0110 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
        </svg>
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/>
        </svg>
      </div>
    </div>

    <!-- Swipeable screens -->
    <div class="screens-wrapper" id="screensWrapper">
      <div class="screen">
        <div class="app-grid" id="grid-0"></div>
      </div>
      <div class="screen">
        <div class="app-grid" id="grid-1"></div>
      </div>
    </div>

    <!-- Page dots -->
    <div class="page-dots" id="pageDots">
      <span class="dot active"></span>
      <span class="dot"></span>
    </div>

    <!-- Dock -->
    <div class="dock" id="dock">
      <div class="dock-slot empty" data-slot="0"></div>
      <div class="dock-slot empty" data-slot="1"></div>
      <div class="dock-slot empty" data-slot="2"></div>
      <div class="dock-slot empty" data-slot="3"></div>
    </div>

    <!-- Home indicator -->
    <div class="home-indicator"></div>
  </div>

  <!-- App dialog (sheet) -->
  <div class="dialog-overlay" id="dialogOverlay">
    <div class="dialog">
      <div class="dialog-handle"></div>
      <div class="dialog-header" id="dialogHeader"></div>
      <div class="dialog-body" id="dialogBody"></div>
      <button class="dialog-close" id="dialogClose">Schließen</button>
    </div>
  </div>

  <!-- Drag ghost (follows pointer) -->
  <div class="drag-ghost" id="dragGhost"></div>

  <script src="app.js"></script>
</body>
</html>
